name: Build Docs

on:
  workflow_dispatch:
    inputs:
      rebuild_doxygen:
        description: 'Rebuild Doxygen C++ API docs (slow, one-time)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          submodule-update-strategy: latest
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Sphinx dependencies
        run: pip install -r docs/requirements.txt

      - name: Install pymoose
        # --only-binary forces a wheel: if no wheel exists for this Python,
        # fail fast with a clear error instead of a slow C++ source build.
        run: "pip install --upgrade --only-binary=:all: pymoose"

      - name: Log versions
        run: |
          PYMOOSE_VER=$(python -c "import moose; print(moose.__version__)" 2>/dev/null \
            || pip show pymoose | awk '/^Version:/{print $2}')
          MOOSE_CORE_COMMIT=$(git -C docs/moose-core rev-parse --short HEAD)
          echo "pymoose version:      $PYMOOSE_VER"
          echo "moose-core commit:    $MOOSE_CORE_COMMIT"
          {
            echo "### MOOSE docs build"
            echo "- pymoose: \`$PYMOOSE_VER\`"
            echo "- moose-core HEAD: \`$MOOSE_CORE_COMMIT\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate class references
        env:
          MOOSE_CORE_PATH: ${{ github.workspace }}/docs/moose-core
          MOOSE_EXAMPLES_PATH: ${{ github.workspace }}/docs/moose-examples
        run: python docs/source/generate_references.py

      - name: Build Doxygen C++ API docs
        if: ${{ inputs.rebuild_doxygen }}
        run: |
          sudo apt-get install -y doxygen graphviz
          cd docs/moose-core/docs
          (cat doxygen/Doxyfile; echo "OUTPUT_DIRECTORY = ${{ github.workspace }}/public/doxygen") | doxygen -

      - name: Clean stale built docs
        run: |
          rm -rf public/docs/html
          if [ "${{ inputs.rebuild_doxygen }}" = "true" ]; then
            rm -rf public/doxygen
          fi

      - name: Build Sphinx docs
        env:
          MOOSE_CORE_PATH: ${{ github.workspace }}/docs/moose-core
          MOOSE_EXAMPLES_PATH: ${{ github.workspace }}/docs/moose-examples
        run: sphinx-build -b html docs/source public/docs/html

      - name: Add CNAME for docs subdomain
        run: echo "docs.mooseneuro.org" > public/docs/html/CNAME

      - name: Commit and push built docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -fA public/docs/html/
          if [ "${{ inputs.rebuild_doxygen }}" = "true" ]; then
            git add -fA public/doxygen/
          fi
          git diff --cached --quiet || git commit -m "chore: update built docs [skip ci]"
          git push
